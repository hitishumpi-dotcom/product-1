<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product 1 Desktop</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(21, 30, 54, 0.88);
      --border: rgba(117, 137, 180, 0.25);
      --text: #eef3ff;
      --muted: #9fb0d8;
      --accent: #6aa6ff;
      --danger: #ff7373;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #162544 0%, var(--bg) 60%);
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }
    .card {
      width: min(720px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 10px; font-size: 30px; }
    p { margin: 0 0 10px; color: var(--muted); line-height: 1.55; }
    .status { margin: 18px 0 10px; font-size: 16px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 14px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(106,166,255,.8);
      animation: pulse 1.2s infinite ease-in-out;
    }
    .error .dot {
      background: var(--danger);
      box-shadow: 0 0 18px rgba(255,115,115,.9);
      animation: none;
    }
    .meta {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      background: #6aa6ff;
      color: #071226;
      font-weight: 700;
    }
    button.secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.25); opacity: .75; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="pill" id="pill"><span class="dot"></span><span id="phase">Starting</span></div>
    <h1>Product 1 Desktop</h1>
    <p>Launching the bundled Product 1 local server and preparing the app window.</p>
    <p class="status" id="detail">Checking backend status…</p>
    <div class="actions">
      <button id="retry" type="button">Retry</button>
      <button id="openBrowser" type="button" class="secondary">Open in browser</button>
    </div>
    <div class="meta" id="meta">Loading desktop metadata…</div>
  </main>

  <script>
    const phaseEl = document.getElementById('phase');
    const detailEl = document.getElementById('detail');
    const metaEl = document.getElementById('meta');
    const pillEl = document.getElementById('pill');
    const retryBtn = document.getElementById('retry');
    const openBrowserBtn = document.getElementById('openBrowser');

    let serverUrl = 'http://127.0.0.1:4311';

    function renderStatus(payload) {
      if (!payload) return;
      serverUrl = payload.serverUrl || serverUrl;
      phaseEl.textContent = payload.phase || 'Starting';
      detailEl.textContent = payload.detail || 'Waiting for Product 1…';
      pillEl.classList.toggle('error', payload.phase === 'error');
      openBrowserBtn.disabled = false;
    }

    window.product1Desktop.getMeta().then((meta) => {
      serverUrl = meta.serverUrl;
      metaEl.textContent = `Mode: ${meta.isPackaged ? 'packaged build' : 'development'} · Backend: ${meta.backendRoot} · URL: ${meta.serverUrl}`;
      openBrowserBtn.disabled = false;
    }).catch((error) => {
      metaEl.textContent = `Failed to load desktop metadata: ${error.message}`;
    });

    window.product1Desktop.onBackendStatus(renderStatus);

    retryBtn.addEventListener('click', async () => {
      await window.product1Desktop.reloadProduct();
    });

    openBrowserBtn.addEventListener('click', async () => {
      await window.product1Desktop.openExternal(serverUrl);
    });
  </script>
</body>
</html>
