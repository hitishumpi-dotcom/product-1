<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Welcome to Product 1 Desktop</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: white; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { width: min(720px, 90vw); background:#111827; border:1px solid #334155; border-radius:16px; padding:32px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    h1 { margin-top:0; }
    p { color:#cbd5e1; line-height:1.5; }
    button { padding:12px 16px; border:none; border-radius:10px; background:#22c55e; color:#052e16; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to Product 1 Desktop</h1>
    <p>This app will open the setup wizard for first-time configuration. You only need to enter your credentials and test the vote once.</p>
    <p>After that, you can start the scheduler and use the app normally.</p>
    <button id="continueBtn">Open setup</button>
  </div>
  <script>
    document.getElementById('continueBtn').addEventListener('click', async () => {
      if (window.product1Desktop?.completeFirstRun) {
        await window.product1Desktop.completeFirstRun();
      }
      if (window.product1Desktop?.reloadProduct) {
        await window.product1Desktop.reloadProduct();
      }
    });
  </script>
</body>
</html>
